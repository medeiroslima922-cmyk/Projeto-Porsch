<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./styles.css">
    <title>JC PORSCH</title>
</head><link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
<body>
    <header>
        <img src="./img/Porsche-Logo.png" alt="Logo JC PORSCH" 
        class="brand">
       
        <nav> 
            <ul>
                <li><a href="#interiores-section">Interiores</a></li>
                <li>Carros</li>
                <li><a href="#" id="fale-comigo">Fale Conosco</a></li>   
            </ul>
        </nav>
    </header>
    
    
  <section class="hero">

   <div class="slider"> 

     <div class="slides">
        <!-- SLIDE 1: VIDEO (PRIMEIRO - SUBSTITUA AQUI) -->
        <div class="slide active">
            <video autoplay muted loop playsinline>
                <source src="./img/porsche.mp4" type="video/mp4">
                Seu navegador não suporta vídeo.
            </video>
         </div>
      <div class="slide">
        <img src="./img/Taycan.jpg" alt="Porsche Taycan">
        <h1>Porsche Taycan</h1>
       </div>

       <div class="slide">
        <img src="./img/911.jpg" alt="Porsche 911">
        <h1>Porsche 911</h1>
       </div>

       <div class="slide">
        <img src="./img/911.por.png.jpeg" alt="Porsche 911">
        <h1>Porsche Cayenne</h1>
       </div>

    </div>

    <!--bolinhas-->
   <div class="navigation">
     <span class="dot active"></span>
     <span class="dot"></span>
     <span class="dot"></span>
     <span class="dot"></span>
   </div>

  </section>
     <div class="car-info">
                    <h2>PORSCHE</h2>
                    <p>O carro esportivo mais rápido do mercado, com design inovador e tecnologia de ponta.</p>
                </div>
             <div>
       </div>
    </section>
   <!-- Menu dropdown em Interiores -->
<div id="interiores-dropdown" style="display: none;">
    <ul class="dropdown-menu">
        <li onclick="showInterior('taycan')">Taycan Interior</li>
        <li onclick="showInterior('911')">911 Interior</li>
        <li onclick="showInterior('cayenne')">Cayenne Interior</li>
    </ul>
</div>

<!-- Imagens específicas (escondidas inicialmente) -->
<div id="taycan-images" class="images-container" style="display: none;">
    <img src="./img/Taycan.interno.jpg" alt="Taycan">
    <button onclick="closeImages()">Fechar</button>
</div>
<div id="911-images" class="images-container" style="display: none;">
    <img src="./img/Interno911.avif" alt="911">
    <button onclick="closeImages()">Fechar</button>
</div>
<div id="cayenne-images" class="images-container" style="display: none;">
    <img src="./img/Taycan.interno2.webp" alt="Cayenne">
    <button onclick="closeImages()">Fechar</button>
</div>

    <script src="script.js" defer></script>
</body>
</html>
