</head><link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
<body>
    <header>

        class="brand">
       
        </div>

   <section class="hero">

    <div class="slides">

      <div class="slide">

        <img src="./img/911.png" alt="Porsche 911">

      <label for="slide1"></label>

  </div>

</section>

    </section>
     <div class="car-info">

             <div>
       </div>

         <div class="arrows">

            </ul>
        </div>
    </section>
</html>
<script>
window.addEventListener("scroll", function() {
    const header = document.querySelector("header");

    if (window.scrollY > 100) {
        header.classList.add("rolando");
    } else {
        header.classList.remove("rolando");
    }
});
</script>
